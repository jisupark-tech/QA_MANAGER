# ============================================================
# Escalation Rules Template
# ============================================================
# Phase 1 에서 작성
# 복사: cp templates/escalation_rules.yaml games/{game_name}/escalation_rules.yaml
# 규칙은 위에서 아래로 순서대로 평가됩니다 (먼저 매칭되는 규칙 적용)
# ============================================================

# --- 에스컬레이션 액션 정의 ---
# human_review:   AI가 응답 초안 작성 → 사람이 검수 후 전송
# human_takeover: AI 응답 없이 즉시 사람에게 전달
# auto_with_flag: AI가 자동 응답하되, 사람에게 알림 전송

# --- 우선순위 정의 ---
# urgent:  즉시 대응 (5분 이내)
# high:    빠른 대응 (30분 이내)
# medium:  일반 대응 (2시간 이내)
# low:     여유 대응 (당일 내)

rules:
  # === 결제 관련 ===
  - id: esc_001
    name: "고액 결제 문의"
    condition:
      type: payment_amount
      operator: ">="
      value: 100000                  # 10만원 이상
    action: human_review
    priority: high
    reason: "고액 결제 건은 반드시 사람이 확인합니다"
    notification: true               # 알림 발송 여부

  - id: esc_002
    name: "환불 요청"
    condition:
      type: keyword_match
      keywords:
        - 환불
        - 취소
        - 돌려줘
        - refund
    action: human_review
    priority: medium
    reason: "환불은 정책 확인 후 처리 필요"

  # === 감정/위험 관련 ===
  - id: esc_003
    name: "분노 감지"
    condition:
      type: sentiment
      operator: "=="
      value: angry                   # LLM이 판정한 감정 상태
    action: human_takeover
    priority: urgent
    reason: "감정적 유저는 사람이 직접 대응"

  - id: esc_004
    name: "법적 언급"
    condition:
      type: keyword_match
      keywords:
        - 소송
        - 고소
        - 법률
        - 변호사
        - 소비자원
        - 신고
        - 고발
    action: human_takeover
    priority: urgent
    reason: "법적 분쟁 가능성 → 즉시 사람 전환"

  - id: esc_005
    name: "자해/위협 언급"
    condition:
      type: keyword_match
      keywords:
        - 자살
        - 죽겠
        - 해치
        - 위협
    action: human_takeover
    priority: urgent
    reason: "안전 관련 문의 → 즉시 사람 전환"

  # === 반복/미해결 ===
  - id: esc_006
    name: "반복 문의 (3회 이상)"
    condition:
      type: repeat_count
      operator: ">="
      value: 3                       # 동일 유저 3회 이상 같은 주제 문의
    action: human_takeover
    priority: high
    reason: "반복 문의는 AI 해결 실패 의미 → 사람 대응"

  # === AI 확신도 ===
  - id: esc_007
    name: "AI 확신도 낮음"
    condition:
      type: confidence
      operator: "<"
      value: 0.7                     # LLM의 자체 확신도 점수
    action: human_review
    priority: medium
    reason: "AI가 확신이 낮은 응답은 사람 검수 필요"

  # === 제재 관련 ===
  - id: esc_008
    name: "영구 제재 이의"
    condition:
      type: keyword_match
      keywords:
        - 영구 정지
        - 영구 밴
        - 영정
        - permanent ban
    action: human_takeover
    priority: high
    reason: "영구 제재 관련은 반드시 사람이 판단"

  # --- 아래에 게임별 커스텀 규칙 추가 ---
  # - id: esc_009
  #   name: "..."
  #   condition:
  #     type: ...
  #   action: ...
  #   priority: ...
  #   reason: "..."
