# ============================================================
# FAQ Data Template
# ============================================================
# Phase 1 에서 작성
# 복사: cp templates/faq_template.yaml games/{game_name}/faq/general.yaml
# 카테고리별 분리 권장: account.yaml, payment.yaml, gameplay.yaml, etc.
# 최소 10개, 권장 30~50개 이상
# ============================================================

faqs:
  # --- 계정 관련 ---
  - id: faq_001
    category: account
    question: "비밀번호를 잊어버렸어요"
    answer: |
      비밀번호 재설정 방법:
      1. 로그인 화면에서 '비밀번호 찾기'를 탭하세요.
      2. 가입 시 사용한 이메일을 입력하세요.
      3. 이메일로 전송된 링크를 클릭하여 새 비밀번호를 설정하세요.
      이메일을 받지 못한 경우 스팸함을 확인해주세요.
    keywords:
      - 비번
      - 패스워드
      - 로그인 안됨

  - id: faq_002
    category: account
    question: "계정 연동은 어떻게 하나요?"
    answer: |
      설정 > 계정 > 계정 연동에서 Google 또는 Apple 계정을 연결할 수 있습니다.
      연동하면 기기 변경 시에도 데이터가 보존됩니다.
    keywords:
      - 연동
      - 구글 연결
      - 기기 변경

  # --- 결제 관련 ---
  - id: faq_003
    category: payment
    question: "결제했는데 아이템이 안 들어와요"
    answer: |
      결제 후 아이템 미지급 시:
      1. 앱을 완전히 종료 후 재접속해주세요.
      2. 일반적으로 5분 이내에 자동 지급됩니다.
      3. 10분 이상 미지급 시 결제 영수증과 함께 문의해주세요.
    keywords:
      - 결제 오류
      - 미지급
      - 구매 안됨
      - 돈 나갔는데

  - id: faq_004
    category: payment
    question: "환불 받을 수 있나요?"
    answer: |
      환불 정책:
      - 구매 후 7일 이내, 아이템 미사용 시 환불 가능합니다.
      - 환불 요청 시 결제 영수증을 함께 보내주세요.
      - 처리까지 3영업일 소요됩니다.
      상세 환불 정책은 고객센터 공지를 확인해주세요.
    keywords:
      - 환불
      - 취소
      - 돌려받기

  # --- 게임플레이 ---
  - id: faq_005
    category: gameplay
    question: "레벨업은 어떻게 하나요?"
    answer: |
      (게임에 맞게 수정하세요)
    keywords:
      - 레벨
      - 성장
      - 경험치

  # --- 이벤트 ---
  - id: faq_006
    category: event
    question: "이벤트 보상은 어디서 받나요?"
    answer: |
      (게임에 맞게 수정하세요)
    keywords:
      - 이벤트
      - 보상
      - 수령

  # --- 버그 관련 ---
  - id: faq_007
    category: bug
    question: "게임이 자꾸 튕겨요"
    answer: |
      게임 크래시 해결 방법:
      1. 앱을 최신 버전으로 업데이트해주세요.
      2. 기기 저장 공간을 확인해주세요 (최소 500MB 여유 필요).
      3. 기기를 재부팅 후 다시 시도해주세요.
      계속 발생 시 기기 모델명과 OS 버전을 알려주시면 확인하겠습니다.
    keywords:
      - 튕김
      - 크래시
      - 강제 종료
      - 꺼짐

  # --- 아래에 게임별 FAQ 추가 ---
